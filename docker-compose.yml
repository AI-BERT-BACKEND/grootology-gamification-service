services:
  postgres:
    image: postgres:16-alpine

    container_name: gamification-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5436:5432"

    volumes:
      - gamification_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .

    container_name: gamification-service

    restart: unless-stopped

    ports:
      - "1508:1508"

    environment:
      DB_NAME: ${DB_NAME:-gamification}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/${DB_NAME:-gamification}}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-qa}

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  gamification_db_data:
