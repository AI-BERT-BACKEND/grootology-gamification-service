services:
  kafka:
    image: bitnami/kafka:3.8

    container_name: gamification-kafka

    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  postgres:
    image: postgres:16-alpine

    container_name: gamification-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5436:5432"

    volumes:
      - gamification_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .

    container_name: gamification-service

    restart: unless-stopped

    ports:
      - "1508:1508"

    environment:
      DB_NAME: ${DB_NAME:-gamification}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/${DB_NAME:-gamification}}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-qa}

    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy

volumes:
  gamification_db_data:
