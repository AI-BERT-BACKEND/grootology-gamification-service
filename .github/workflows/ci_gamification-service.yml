name: CI/CD - Gamification Service

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  compile:
    name: Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile -B --no-transfer-progress

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: compile

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:h2:mem:testdb
      DB_USERNAME: sa
      DB_PASSWORD: sa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -B --no-transfer-progress

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'
          check_name: 'Unit Test Results'
          comment_mode: always

      - name: Upload build target
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-target-${{ github.sha }}
          path: target/
          retention-days: 1

  analyze:
    name: Analysis and reports
    runs-on: ubuntu-latest
    needs: test

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:h2:mem:testdb
      DB_USERNAME: sa
      DB_PASSWORD: sa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Download build target
        uses: actions/download-artifact@v4
        with:
          name: build-target-${{ github.sha }}
          path: target/

      - name: Generate JaCoCo report
        run: ./mvnw jacoco:report -B --no-transfer-progress

      - name: Analyze with SonarCloud
        run: >
          ./mvnw sonar:sonar -B --no-transfer-progress
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.junit.reportPaths=target/surefire-reports
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-gamification-run${{ github.run_number }}-${{ github.sha }}
          path: target/site/jacoco/
          retention-days: 7

      - name: Add JaCoCo report link to summary
        if: always()
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "## 📊 Reporte de Cobertura JaCoCo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "El reporte fue generado exitosamente. Descárgalo desde la sección **Artifacts** de esta ejecución:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 Ver artifacts de esta ejecución]($ARTIFACT_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Descarga el artifact \`jacoco-report-run${{ github.run_number }}-${{ github.sha }}\` y abre \`index.html\` en tu navegador." >> $GITHUB_STEP_SUMMARY

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ai-bert-backend/grootology-gamification-service
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=qa-latest,enable=${{ github.ref == 'refs/heads/develop'}}
            type=raw,value=prod-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/ai-bert-backend/grootology-gamification-service:qa-latest
          cache-to: type=inline

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    environment:
      name: QA

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENCIALES_QA }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: aibert-rg
          containerAppName: aibert-gamification-service-qa
          imageToDeploy: ghcr.io/ai-bert-backend/grootology-gamification-service:qa-latest
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: PROD

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENCIALES_PROD }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: aibert-rg
          containerAppName: aibert-gamification-service-prod
          imageToDeploy: ghcr.io/ai-bert-backend/grootology-gamification-service:prod-latest
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_TOKEN }}
